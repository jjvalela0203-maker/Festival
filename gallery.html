    <body>
        <header class="main-header">
            <h1><img src="resources/img/logo.png" alt="Logo" class="logo">Fusion Gourmet: Festival Gastronomico </h1>
            <nav class="menu">
                <ul>
                    <li><a href="index.html">Inicio</a></li>

                    <li><a href="about.html">Sobre nosotros</a></li>
                    <li><a href="gallery.html">Galeria</a></li>
                </ul>
            </nav>
        </header>
        <div class="hero">
            <img src="resources/img/festival-gl.jpg">
            <h1><b>Galeria de platos</b></h1>
        </div>        
            <section class="platos">
                <div class="grid-fotos">
                    <figure>
                        <h3><b>Foie Gras</b></h3>
                        <div class="foto-item" style="background-image: url('resources/img/Foie Gras.jpg');"></div>
                        <figcaption>Presente en todas las mesas durante las fiestas de fin de año y en diversas formas: mi-cuit, entier, en bloc, con higos, trufado, etc. La mejor manera de degustarlo es sobre un pan tostado con un confit de cebollas.</figcaption>
                    </figure>
                    <figure>
                        <h3><b>Cassoulet</b></h3>
                        <div class="foto-item" style="background-image: url('resources/img/Cassoulet.jpg');"></div>
                        <figcaption>Este plato, originario de Languedoc-Roussillon, está compuesto de alubias blancas, muslos de pato y carne de cerdo.</figcaption>
                    </figure>
                    <figure>
                        <h3><b>Quiche Lorraine</b></h3>
                        <div class="foto-item" style="background-image: url('resources/img/Quiche Lorraine.jpg');"></div>
                        <figcaption>Una tarta rellena de una mezcla compuesta de crème fraiche, leche, huevos, nuez moscada y tocino que le aporta ese pequeño sabor ahumado.</figcaption>
                    </figure>
                    <figure>
                        <h3><b>Bouillabaisse</b></h3>
                        <div class="foto-item" style="background-image: url('resources/img/Bouillabaisse.jpg');"></div>
                        <figcaption>Una sopa de pescado y mariscos, originaria de Marsella, que se sirve caliente en una taza grande.</figcaption>
                    </figure>
                    <figure>
                        <h3><b>Ratatouille</b></h3>
                        <div class="foto-item" style="background-image: url('resources/img/Ratatouille.jpg');"></div>
                        <figcaption>Una receta provenzal muy popular en Francia. Es un plato que se puede elaborar con todo tipo de hortalizas. Casi siempre lleva tomate, berenjena, calabacín, pimientos, cebolla y ajo con hierbas provenzales.</figcaption>
                    </figure>
                    <figure>
                        <h3><b>Blanquette de ternera</b></h3>
                        <div class="foto-item" style="background-image: url('resources/img/Blanquette-de-ternera.jpg');"></div>
                        <figcaption>Es un plato cocinado con carne de ternera estofada, de zanahorias, de salsa mantecada, y champiñones. </figcaption>
                    </figure>
                </div>
            </section>
